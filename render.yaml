services:
  # MedFusion AI FastAPI Backend Web Service
  - type: web
    name: medfusion-backend
    env: python
    repo: https://github.com/mayur-d09/medfusion-ai
    rootDir: MedFusionAI/backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    plan: free
    envVars:
      - key: MONGODB_URI
        sync: false
        placeholder: "mongodb+srv://<username>:<password>@cluster.mongodb.net/medfusion"
      - key: JWT_SECRET
        generateValue: true
      - key: GEMINI_API_KEY
        sync: false
        placeholder: "Your Gemini API key"
      - key: CLOUDINARY_URL
        sync: false
        placeholder: "Optional Cloudinary connection URL"
